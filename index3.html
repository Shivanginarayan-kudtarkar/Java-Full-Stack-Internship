<!DOCTYPE html>
<html>
<head>
    <title>Multiple Elements Styling</title>
    <style>
        p {
            color: green;
        }
        div {
            background-color: lightgray;
            padding: 10px;
        }
        h1 {
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Welcome</h1>
    <p>This paragraph is green.</p>
    <div>This div has a light gray background.</div>

</body>
</html>
